<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Apex Pulse icon">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0A0E1A" stroke="#00D4FF" stroke-width="2"/>

  <!-- Pulse / ECG waveform -->
  <polyline
    points="10,50 22,50 27,32 32,68 37,38 42,58 47,50 90,50"
    fill="none"
    stroke="#00D4FF"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Accent dot at peak -->
  <circle cx="37" cy="38" r="3" fill="#FF4D6D"/>

  <!-- "AP" monogram, small, bottom-right -->
  <text x="62" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#00D4FF" letter-spacing="1">AP</text>
</svg>
